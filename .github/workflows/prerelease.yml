name: Create or update prerelease

on:
  workflow_dispatch:      # allows manual trigger

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # fetch all history and tags
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows executable
        if: matrix.os == 'windows-latest'
        run: npm run build:win

      - name: Build macOS executable
        if: matrix.os == 'macos-latest'
        run: npm run build:mac

      - name: Upload Windows build artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe
          retention-days: 1
          if-no-files-found: error

      - name: Upload macOS build artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 1
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push tags and create releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # fetch all history and tags
          ref: main

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ -z "$VERSION" ]; then
            echo "❌ Could not find version in package.json"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ Version: $VERSION"

      - name: Check if tag ${{ steps.version.outputs.version }} exists
        id: tag_check
        run: |
          TAG="${{ steps.version.outputs.version }}"
          if git tag -l | grep -Fx "$TAG"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "📌 Tag $TAG already exists – will update its release"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "🏷️ Tag $TAG does not exist – will create new tag & prerelease"
          fi

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: dist/

      - name: Create and push new tag (if version is new)
        if: steps.tag_check.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "$VERSION"
          git push origin "$VERSION"
          echo "✅ Tag $VERSION created and pushed"

      - name: Create or update GitHub Release (using GitHub CLI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="$VERSION"
          # Check if release already exists for this tag
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "📦 Release $TAG exists – updating assets only (notes left untouched)"
            # Delete all existing assets
            gh release view "$TAG" --json assets -q '.assets[].name' | while read asset; do
              echo "  Deleting old asset: $asset"
              gh release delete-asset "$TAG" "$asset" --yes
            done

            # Upload new build files (--clobber overwrites any leftovers)
            gh release upload "$TAG" dist/* --clobber
          else
            echo "✨ Release $TAG does not exist – creating new prerelease with auto-generated notes"
            # Create new release as prerelease, attach builds, and let GitHub generate notes
            gh release create "$TAG" dist/* \
              --generate-notes \
              --title "$TAG" \
              --prerelease
          fi
