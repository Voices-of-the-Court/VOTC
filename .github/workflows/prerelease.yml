name: Create or update prerelease

on:
  workflow_dispatch:      # allows manual trigger

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows executable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win

      - name: Upload Windows build artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/
          retention-days: 1
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ -z "$VERSION" ]; then
            echo "❌ Could not find version in package.json"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ Version: $VERSION"

      - name: Check if tag ${{ steps.version.outputs.version }} exists
        id: tag_check
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git tag -l | grep -Fx "$TAG"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "📌 Tag $TAG already exists – will update its release"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "🏷️ Tag $TAG does not exist – will create new tag & prerelease"
          fi

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist/

      - name: Create and push new tag (if version is new)
        if: steps.tag_check.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v$VERSION"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "✅ Tag $TAG created and pushed"

      - name: Create or update GitHub Release (using GitHub CLI)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "📦 Release $TAG exists – updating assets only"
            gh release upload "$TAG" dist/* --clobber
          else
            echo "✨ Creating new prerelease $TAG"
            gh release create "$TAG" dist/* \
              --generate-notes \
              --title "$TAG" \
              --prerelease
          fi